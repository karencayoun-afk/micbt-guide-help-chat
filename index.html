function App() {
  const [week, setWeek]       = useState(5);
  const [messages, setMessages] = useState([]);
  const [input, setInput]     = useState("");
  const [loading, setLoading] = useState(false);
  const [started, setStarted] = useState(false);
  const chatRef  = useRef(null);
  const inputRef = useRef(null);

  const w = WEEKS[week - 1];

  useEffect(() => {
    if (chatRef.current) chatRef.current.scrollTop = chatRef.current.scrollHeight;
  }, [messages, loading]);

  function startChat() {
    const greeting = "Hello, I am glad you are here.\n\nYou are on " + w.stageLabel + ": " + w.title + ". Your practice right now is " + w.practice + ".\n\nHow are things going for you at this stage?";
    setMessages([{ role:"assistant", text:greeting }]);
    setStarted(true);
    setTimeout(() => inputRef.current && inputRef.current.focus(), 100);
  }

  async function send(text) {
    const msg = (text || input).trim();
    if (!msg || loading) return;
    setInput("");
    const newMessages = [...messages, { role:"user", text:msg }];
    setMessages(newMessages);
    setLoading(true);
    const apiMessages = newMessages.map(function(m) {
      return { role: m.role === "user" ? "user" : "assistant", content: m.text };
    });
    try {
      const res = await fetch("/.netlify/functions/chat", {
        method:"POST",
        headers:{
          "Content-Type":"application/json"
        },
        body: JSON.stringify({
          messages: apiMessages,
          systemPrompt: buildSystemPrompt(week)
        })
      });
      const data = await res.json();
      const reply = data.content && data.content[0] ? data.content[0].text : "I am here - could you say a little more?";
      setMessages(function(prev) { return [...prev, { role:"assistant", text:reply }]; });
    } catch(e) {
      setMessages(function(prev) { return [...prev, { role:"assistant", text:"Connection issue - please try again." }]; });
    }
    setLoading(false);
    if (inputRef.current) inputRef.current.focus();
  }

  function handleKey(e) {
    if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); send(); }
  }

  function renderText(text) {
    const lines = text.split("\n").filter(Boolean);
    const elements = [];
    let listItems = [];
    let inList = false;
    
    lines.forEach(function(line, i) {
      // Check for list items
      const listMatch = line.match(/^[\s]*[-•*]\s+(.*)/);
      const numberedMatch = line.match(/^[\s]*\d+\.\s+(.*)/);
      
      if (listMatch || numberedMatch) {
        inList = true;
        const content = listMatch ? listMatch[1] : numberedMatch[1];
        listItems.push(content);
      } else {
        // Flush list if we have items
        if (listItems.length > 0 && !listMatch && !numberedMatch) {
          const isNumbered = lines[i-1] && lines[i-1].match(/^[\s]*\d+\./);
          const ListTag = isNumbered ? 'ol' : 'ul';
          elements.push(React.createElement(ListTag, { key:'list-'+i, style:{ margin:'8px 0', paddingLeft:20 } },
            listItems.map(function(item, idx) {
              return React.createElement('li', { key:idx, style:{ marginBottom:4, lineHeight:1.6 } },
                renderInlineMarkdown(item)
              );
            })
          ));
          listItems = [];
          inList = false;
        }
        
        if (line.trim()) {
          elements.push(React.createElement('p', { key:i, style:{ margin:'0 0 8px', lineHeight:1.7, fontSize:16, color:TEXT_DARK } },
            renderInlineMarkdown(line)
          ));
        }
      }
    });
    
    // Flush remaining list
    if (listItems.length > 0) {
      elements.push(React.createElement('ul', { key:'list-end', style:{ margin:'8px 0', paddingLeft:20 } },
        listItems.map(function(item, idx) {
          return React.createElement('li', { key:idx, style:{ marginBottom:4, lineHeight:1.6 } },
            renderInlineMarkdown(item)
          );
        })
      ));
    }
    
    return elements;
  }
  
  function renderInlineMarkdown(text) {
    // Handle **bold** and __bold__
    let parts = text.split(/(\*\*.*?\*\*|__.*?__)/);
    return parts.map(function(part, i) {
      if (part.match(/^(\*\*|__).*(\*\*|__)$/)) {
        const content = part.replace(/(\*\*|__)/g, '');
        return React.createElement('strong', { key:i, style:{ fontWeight:'600', color:'#5a7a96' } }, content);
      }
      // Handle *italic* and _italic_
      if (part.match(/^\*[^*]+\*$|^_[^_]+_$/)) {
        const content = part.replace(/(\*|_)/g, '');
        return React.createElement('em', { key:i, style:{ fontStyle:'italic' } }, content);
      }
      return part;
    });
  }

  if (!started) {
    return (
      <div style={{ minHeight:"100vh", display:"flex", flexDirection:"column", background:"#f5f3f1" }}>

        <div style={{ background:TEAL, padding:"32px 24px 28px" }}>

          <div style={{ fontSize:28, color:"white", fontWeight:"600", lineHeight:1.2, marginBottom:8 }}>Lumi</div>
          <div style={{ fontSize:13, color:"rgba(255,255,255,.6)", lineHeight:1.6 }}>Questions about the MiCBT Guide app? Ask here.</div>
        </div>

        <div style={{ padding:"20px 20px 0" }}>
          <div style={{ fontSize:11, letterSpacing:".12em", textTransform:"uppercase", color:"#5a7a96", marginBottom:12 }}>Which stage are you on?</div>
          <div style={{ display:"grid", gridTemplateColumns:"repeat(5,1fr)", gap:8 }}>
            {WEEKS.map(function(wk) {
              const sel = week === wk.n;
              return (
                <button key={wk.n} onClick={function(){ setWeek(wk.n); }} style={{
                  padding:"10px 4px", borderRadius:8,
                  border:"1.5px solid " + (sel ? ORANGE : "#ddd"),
                  background: sel ? ORANGE : "white",
                  color: sel ? "white" : "#666",
                  textAlign:"center"
                }}>
                  <div style={{ fontSize:14, fontWeight:"600" }}>{wk.shortLabel}</div>
                </button>
              );
            })}
          </div>
        </div>

        <div style={{ margin:"16px 20px 0", background:"white", border:"1px solid #e8e8e8", borderRadius:12, padding:"16px" }} className="fade-up">
          <div style={{ fontSize:11, letterSpacing:".1em", textTransform:"uppercase", color:ORANGE, fontWeight:"600", marginBottom:8 }}>{w.stageLabel}</div>
          <div style={{ fontSize:17, color:"#344f5c", marginBottom:8, fontWeight:"500", lineHeight:1.3 }}>{w.title}</div>
          <div style={{ fontSize:13, color:TEXT_DARK, lineHeight:1.6 }}>{w.practice}</div>
        </div>

        <div style={{ padding:"16px 20px 0" }}>
          <div style={{ fontSize:11, letterSpacing:".12em", textTransform:"uppercase", color:"#5a7a96", marginBottom:10 }}>You can ask about anything, for example:</div>
          <div style={{ display:"flex", flexWrap:"wrap", gap:8 }}>
            {STAGE_PROMPTS[w.n].map(function(p, i) {
              return (
                <div key={i} style={{ padding:"8px 14px", background:"white", border:"1px solid #e8e8e8", borderRadius:20, fontSize:13, color:TEXT_DARK, fontWeight:"500" }}>
                  {p.label}
                </div>
              );
            })}
          </div>
        </div>

        <div style={{ margin:"16px 20px 0", padding:"10px 14px", background:"#e8eef5", borderRadius:8, fontSize:12, color:"#5a7a96", lineHeight:1.6, borderLeft:"4px solid #5a7a96" }}>
          <strong>Note: </strong>I'm here to help with questions about the app and program. For clinical concerns, please contact a healthcare professional or your therapist.
        </div>

        <div style={{ padding:"20px 20px 24px", marginTop:"auto" }}>
          <button onClick={startChat} style={{
            width:"100%", padding:"14px", background:ORANGE, color:"white",
            border:"none", borderRadius:10, fontSize:15, fontWeight:"600"
          }}>
            Start talking
          </button>
        </div>
      </div>
    );
  }

  return (
    <div style={{ height:"100vh", display:"flex", flexDirection:"column", background:"#f5f3f1" }}>

      <div style={{ background:TEAL, padding:"12px 16px", display:"flex", alignItems:"center", gap:12, flexShrink:0, backdropFilter:"blur(10px)", boxShadow:"0 4px 16px rgba(52, 79, 92, 0.22)" }}>
        <button onClick={function(){ setStarted(false); setMessages([]); }} style={{
          background:"none", border:"none", color:"rgba(255,255,255,.5)", fontSize:20, padding:0, lineHeight:1
        }}>{"<"}</button>
        <img src="./lumi.png" alt="Lumi" style={{ width:40, height:40, borderRadius:"8px", flexShrink:0, objectFit:"contain" }} />
        <div>
          <div style={{ fontSize:14, fontWeight:"600", color:"white" }}>MiCBT Guide</div>
          <div style={{ fontSize:11, color:"rgba(255,255,255,.5)" }}>{w.stageLabel}</div>
        </div>
      </div>

      <div ref={chatRef} style={{ flex:1, overflowY:"auto", padding:"16px 14px 8px", display:"flex", flexDirection:"column", gap:12 }}>
        {messages.map(function(m, i) {
          return (
            <div key={i} style={{ display:"flex", gap:8, flexDirection: m.role === "user" ? "row-reverse" : "row", alignItems:"flex-start" }} className="fade-up">
              {m.role === "assistant" && (
                <img src="./lumi.png" alt="Lumi" style={{ width:32, height:32, borderRadius:"6px", flexShrink:0, marginTop:2, objectFit:"contain" }} />
              )}
              <div style={{
                maxWidth:"82%",
                padding: m.role === "user" ? "9px 14px" : "12px 15px",
                borderRadius: m.role === "user" ? "14px 3px 14px 14px" : "3px 14px 14px 14px",
                background: m.role === "user" ? ORANGE : "white",
                border: m.role === "user" ? "none" : "1px solid #e8e8e8",
                color: m.role === "user" ? "white" : TEXT_DARK,
                fontSize: m.role === "user" ? 15 : 16,
                lineHeight: 1.65,
                boxShadow: m.role === "user" ? "0 4px 12px rgba(52, 79, 92, 0.18)" : "0 4px 12px rgba(52, 79, 92, 0.15)"
              }}>
                {m.role === "assistant" ? renderText(m.text) : m.text}
              </div>
            </div>
          );
        })}

        {loading && (
          <div style={{ display:"flex", gap:8, alignItems:"flex-start" }}>
            <img src="./lumi.png" alt="Lumi" style={{ width:32, height:32, borderRadius:"6px", flexShrink:0, objectFit:"contain" }} />
            <div style={{ padding:"12px 15px", background:"white", border:"1px solid #e8e8e8", borderRadius:"3px 14px 14px 14px", display:"flex", gap:5, alignItems:"center", boxShadow:"0 4px 12px rgba(52, 79, 92, 0.15)" }}>
              {[0, .25, .5].map(function(d, i) {
                return <div key={i} style={{ width:7, height:7, borderRadius:"50%", background:"#ccc", animation:"dot 1.3s infinite " + d + "s" }} />;
              })}
            </div>
          </div>
        )}
      </div>

      {messages.length <= 1 && (
        <div style={{ padding:"4px 14px 10px", display:"flex", gap:6, flexWrap:"wrap" }}>
          {STAGE_PROMPTS[w.n].map(function(p, i) {
            return (
              <button key={i} onClick={function(){ send(p.label); }} style={{
                padding:"6px 12px", background:"white", border:"1px solid #ddd",
                borderRadius:20, fontSize:13, color:TEXT_DARK, fontWeight:"500"
              }}>
                {p.label}
              </button>
            );
          })}
        </div>
      )}

      <div style={{ background:"white", borderTop:"1px solid #e8e8e8", padding:"12px 14px 14px", flexShrink:0 }}>
        <div style={{ display:"flex", gap:8, alignItems:"flex-end" }}>
          <textarea
            ref={inputRef}
            value={input}
            onChange={function(e){ setInput(e.target.value); }}
            onKeyDown={handleKey}
            placeholder="Ask anything about your practice..."
            rows={2}
            style={{
              flex:1, padding:"10px 13px", border:"1.5px solid #ddd", borderRadius:10,
              fontSize:16, color:TEXT_DARK, background:"#f9f9f9", resize:"none", lineHeight:1.6
            }}
          />
          <button
            onClick={function(){ send(); }}
            disabled={loading || !input.trim()}
            style={{
              width:44, height:44, borderRadius:10, border:"none",
              background: loading || !input.trim() ? "#ddd" : ORANGE,
              color: loading || !input.trim() ? "#aaa" : "white",
              fontSize:20, flexShrink:0
            }}
          >^</button>
        </div>
        <div style={{ fontSize:11, color:"#aaa", marginTop:6, textAlign:"center" }}>
          Help & support for the MiCBT Guide app
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
