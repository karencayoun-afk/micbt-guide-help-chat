<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Lumi — MiCBT Guide Help</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body, #root { height:100%; }
body { font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif; background:#F5EFE6; }
@keyframes dot {
  0%,100% { opacity:.25; transform:scale(.75); }
  50% { opacity:1; transform:scale(1); }
}
@keyframes fadeUp {
  from { opacity:0; transform:translateY(8px); }
  to { opacity:1; transform:translateY(0); }
}
.fade-up { animation:fadeUp .3s ease both; }
textarea:focus { outline:none; border-color:#B75A2A !important; }
button { cursor:pointer; }
::-webkit-scrollbar { width:3px; }
::-webkit-scrollbar-thumb { background:#d1d1d6; border-radius:2px; }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<script type="text/babel">
const { useState, useRef, useEffect } = React;

const ORANGE = "#B75A2A";   /* CTA Orange */
const TEAL   = "#1E3349";   /* Primary navy (header) */
const TEAL_SECONDARY = "#5E7186";   /* Primary Mid (bold text) */
const TEXT_DARK = "#344f5c";   /* body text */
const BG_WARM = "#F5EFE6";   /* Background */
const CARD = "#FFFFFF";   /* response bubble: white */
const BORDER = "#E2D9CC";   /* Border */
const USER_BUBBLE = "#1E3349";   /* navy user bubbles */

const SYSTEM_PROMPT = [
  "You are Lumi, a warm, knowledgeable guide for people using the MiCBT Guide app — a 10-week",
  "mindfulness-integrated CBT program for well-being and personal growth, based on the work of",
  "Dr Bruno Cayoun and Dr Andrea Grabovac.",
  "",
  "HOW TO ANSWER:",
  "- Give a genuinely helpful, substantive answer grounded in the knowledge base provided to you.",
  "  Explain the 'why' behind techniques, normalise common experiences, and offer practical",
  "  guidance the person can actually use. Aim to be complete — don't give a thin answer and",
  "  defer; teach what the program teaches.",
  "- Write warmly and clearly, like a calm, well-informed mentor. Use the knowledge base in your",
  "  own words rather than quoting it.",
  "- Do NOT end every reply with a question. Close with a question ONLY when you genuinely need",
  "  clarification to help, or when a brief check-in is natural. Most answers should simply end",
  "  with the guidance.",
  "- Do NOT reflexively tell people to 'ask your therapist or support'. Only point elsewhere when",
  "  the question is genuinely outside the program (a specific clinical/medical decision, a",
  "  billing/account issue → support@mindfulness.net.au, or a crisis — see below).",
  "",
  "WHAT YOU ARE AND AREN'T:",
  "- You are an informed guide to the MiCBT program. You can explain concepts, coach practice,",
  "  and reassure. You can speak with insight about how the mind and body work within the MiCBT",
  "  framework.",
  "- You are NOT a clinician. Do not diagnose, do not assess or label someone's mental state, and",
  "  do not give individual medical or treatment advice. Keep guidance educational and general,",
  "  tied to the program.",
  "",
  "PRICING: Stage 1.1 (Week 1) is free; continuing beyond it requires a subscription. For pricing",
  "details point to the App Store / Google Play listing or mindfulness.net.au.",
  "",
  "IF SOMEONE IS DISTRESSED OR IN CRISIS: respond with warmth and without judgement, and gently",
  "encourage them to reach out for real-time human support. Share these resources: in Australia,",
  "Lifeline on 13 11 14 (24/7, or text 0477 13 11 14); if life is in danger, call 000. Anywhere in",
  "the world, they can find a local helpline at findahelpline.com. Do not try to handle a crisis",
  "alone and do not provide clinical treatment — connect them to support."
].join("\n");

const GREETING = "Hi, I'm Lumi. Ask me anything about the MiCBT Guide app or your practice.";

function App() {
  const [messages, setMessages] = useState([{ role:"assistant", text:GREETING }]);
  const [input, setInput]       = useState("");
  const [loading, setLoading]   = useState(false);
  const chatRef  = useRef(null);
  const inputRef = useRef(null);

  useEffect(() => {
    if (chatRef.current) chatRef.current.scrollTop = chatRef.current.scrollHeight;
  }, [messages, loading]);

  useEffect(() => {
    if (inputRef.current) inputRef.current.focus();
  }, []);

  async function send(text) {
    const msg = (text || input).trim();
    if (!msg || loading) return;
    setInput("");
    const newMessages = [...messages, { role:"user", text:msg }];
    setMessages(newMessages);
    setLoading(true);

    const apiMessages = newMessages
      .filter(function(m, i){ return !(i === 0 && m.role === "assistant"); })
      .map(function(m) {
        return { role: m.role === "user" ? "user" : "assistant", content: m.text };
      });

    try {
      const res = await fetch("/.netlify/functions/chat", {
        method:"POST",
        headers:{ "Content-Type":"application/json" },
        body: JSON.stringify({ messages: apiMessages, systemPrompt: SYSTEM_PROMPT })
      });

      const data = await res.json();
      const reply = (data.content && data.content[0]) ? data.content[0].text
                  : "I'm here — could you say a little more?";
      setMessages(function(prev){ return [...prev, { role:"assistant", text: reply }]; });
    } catch(e) {
      setMessages(function(prev){ return [...prev, { role:"assistant", text:"Connection issue — please try again." }]; });
    }
    setLoading(false);
    if (inputRef.current) inputRef.current.focus();
  }

  function handleKey(e) {
    if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); send(); }
  }

  function renderInlineMarkdown(text) {
    const parts = text.split(/(\*\*.*?\*\*|__.*?__)/);
    return parts.map(function(part, i) {
      if (part.match(/^(\*\*|__).*(\*\*|__)$/)) {
        const content = part.replace(/(\*\*|__)/g, '');
        return React.createElement('strong', { key:i, style:{ fontWeight:'600', color:TEAL_SECONDARY } }, content);
      }
      if (part.match(/^\*[^*]+\*$|^_[^_]+_$/)) {
        const content = part.replace(/(\*|_)/g, '');
        return React.createElement('em', { key:i, style:{ fontStyle:'italic' } }, content);
      }
      return part;
    });
  }

  function renderText(text) {
    const lines = text.split("\n").filter(Boolean);
    const elements = [];
    let listItems = [];

    function flushList(key) {
      if (listItems.length) {
        elements.push(React.createElement('ul', { key:'list-'+key, style:{ margin:'6px 0', paddingLeft:20 } },
          listItems.map(function(item, idx){
            return React.createElement('li', { key:idx, style:{ marginBottom:4, lineHeight:1.6 } }, renderInlineMarkdown(item));
          })
        ));
        listItems = [];
      }
    }

    lines.forEach(function(line, i) {
      const listMatch = line.match(/^[\s]*[-•*]\s+(.*)/);
      const numberedMatch = line.match(/^[\s]*\d+\.\s+(.*)/);
      if (listMatch || numberedMatch) {
        listItems.push(listMatch ? listMatch[1] : numberedMatch[1]);
      } else {
        flushList(i);
        if (line.trim()) {
          elements.push(React.createElement('p', { key:i, style:{ margin:'0 0 8px', lineHeight:1.7, fontSize:16, color:TEXT_DARK } },
            renderInlineMarkdown(line)));
        }
      }
    });
    flushList('end');
    return elements;
  }

  return (
    <div style={{ height:"100vh", display:"flex", flexDirection:"column", background:BG_WARM, maxWidth:760, margin:"0 auto" }}>

      <div style={{ background:TEAL, padding:"14px 18px", display:"flex", alignItems:"center", gap:12, flexShrink:0, boxShadow:"0 2px 8px rgba(52,79,92,.18)" }}>
        <img src="./lumi.png" alt="Lumi" style={{ width:40, height:40, borderRadius:8, flexShrink:0, objectFit:"contain" }} />
        <div>
          <div style={{ fontSize:15, fontWeight:"600", color:"white" }}>Lumi</div>
          <div style={{ fontSize:11, color:"rgba(255,255,255,.6)" }}>MiCBT Guide — Help &amp; Support</div>
        </div>
      </div>

      <div ref={chatRef} style={{ flex:1, overflowY:"auto", padding:"18px 14px 8px", display:"flex", flexDirection:"column", gap:12 }}>
        {messages.map(function(m, i) {
          return (
            <div key={i} style={{ display:"flex", gap:8, flexDirection: m.role === "user" ? "row-reverse" : "row", alignItems:"flex-start" }} className="fade-up">
              {m.role === "assistant" && (
                <img src="./lumi.png" alt="Lumi" style={{ width:32, height:32, borderRadius:6, flexShrink:0, marginTop:2, objectFit:"contain" }} />
              )}
              <div style={{
                maxWidth:"82%",
                padding: m.role === "user" ? "9px 14px" : "12px 15px",
                borderRadius: m.role === "user" ? "14px 3px 14px 14px" : "3px 14px 14px 14px",
                background: m.role === "user" ? USER_BUBBLE : CARD,
                border: m.role === "user" ? "none" : "1px solid " + BORDER,
                color: m.role === "user" ? "white" : TEXT_DARK,
                fontSize: m.role === "user" ? 15 : 16,
                lineHeight: 1.65,
                boxShadow: m.role === "user" ? "0 4px 12px rgba(52,79,92,.18)" : "0 4px 12px rgba(52,79,92,.10)"
              }}>
                {m.role === "assistant" ? renderText(m.text) : m.text}
              </div>
            </div>
          );
        })}

        {loading && (
          <div style={{ display:"flex", gap:8, alignItems:"flex-start" }}>
            <img src="./lumi.png" alt="Lumi" style={{ width:32, height:32, borderRadius:6, flexShrink:0, objectFit:"contain" }} />
            <div style={{ padding:"12px 15px", background:CARD, border:"1px solid " + BORDER, borderRadius:"3px 14px 14px 14px", display:"flex", gap:5, alignItems:"center", boxShadow:"0 4px 12px rgba(52,79,92,.10)" }}>
              {[0, .25, .5].map(function(d, i) {
                return <div key={i} style={{ width:7, height:7, borderRadius:"50%", background:"#ccc", animation:"dot 1.3s infinite " + d + "s" }} />;
              })}
            </div>
          </div>
        )}
      </div>

      <div style={{ background:CARD, borderTop:"1px solid " + BORDER, padding:"12px 14px 14px", flexShrink:0 }}>
        <div style={{ display:"flex", gap:8, alignItems:"flex-end" }}>
          <textarea
            ref={inputRef}
            value={input}
            onChange={function(e){ setInput(e.target.value); }}
            onKeyDown={handleKey}
            placeholder="Type your question…"
            rows={1}
            style={{
              flex:1, padding:"11px 14px", border:"1.5px solid " + BORDER, borderRadius:12,
              fontSize:16, color:TEXT_DARK, background:"#FCFAF6", resize:"none", lineHeight:1.5,
              maxHeight:120
            }}
          />
          <button
            onClick={function(){ send(); }}
            disabled={loading || !input.trim()}
            aria-label="Send"
            style={{
              width:46, height:46, borderRadius:12, border:"none",
              background: loading || !input.trim() ? "#e2e2e2" : ORANGE,
              color: loading || !input.trim() ? "#aaa" : "white",
              fontSize:20, flexShrink:0, display:"flex", alignItems:"center", justifyContent:"center"
            }}
          >
            <span style={{ transform:"translateY(-1px)" }}>&#8593;</span>
          </button>
        </div>
        <div style={{ fontSize:11, color:"#aaa", marginTop:7, textAlign:"center" }}>
          Help &amp; support for the MiCBT Guide app
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
