<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Lumi — MiCBT Practice Companion</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body, #root { height:100%; }
body { font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif; background:#F6F2EC; }
@keyframes dot {
  0%,100% { opacity:.25; transform:scale(.75); }
  50% { opacity:1; transform:scale(1); }
}
@keyframes fadeUp {
  from { opacity:0; transform:translateY(8px); }
  to { opacity:1; transform:translateY(0); }
}
.fade-up { animation:fadeUp .3s ease both; }
textarea:focus { outline:none; }
button { cursor:pointer; }
::-webkit-scrollbar { width:3px; }
::-webkit-scrollbar-thumb { background:#d1d1d6; border-radius:2px; }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<script type="text/babel">
const { useState, useRef, useEffect } = React;

const WEEKS = [
  { n:1,  title:"Establishing Self-Care and Commitment",     stage:1, practice:"Progressive Muscle Relaxation (PMR) - 14 min twice daily",   stageLabel:"Stage 1.1", shortLabel:"1.1" },
  { n:2,  title:"Regulating Attention",                      stage:1, practice:"Mindfulness of breath - 30 min twice daily",                 stageLabel:"Stage 1.2", shortLabel:"1.2" },
  { n:3,  title:"Understanding and Regulating Emotions",     stage:1, practice:"Body scanning - 30 min twice daily",                         stageLabel:"Stage 1.3", shortLabel:"1.3" },
  { n:4,  title:"Applying Mindfulness in Daily Life",        stage:1, practice:"Body scanning + mindful activities",                         stageLabel:"Stage 1.4", shortLabel:"1.4" },
  { n:5,  title:"Regulating Behavior and Overcoming Avoidance", stage:2, practice:"Bilateral body scanning - SUDS hierarchy work",           stageLabel:"Stage 2.1", shortLabel:"2.1" },
  { n:6,  title:"Improving Self-Confidence",                 stage:2, practice:"Bilateral body scanning - Bipolar Exposure",                 stageLabel:"Stage 2.2", shortLabel:"2.2" },
  { n:7,  title:"Interpersonal Mindfulness",                 stage:3, practice:"Bilateral scanning - Interpersonal awareness",               stageLabel:"Stage 3.1", shortLabel:"3.1" },
  { n:8,  title:"Mindful Communication",                     stage:3, practice:"Bilateral scanning - Mindful speech practice",               stageLabel:"Stage 3.2", shortLabel:"3.2" },
  { n:9,  title:"Cultivating Compassion",                    stage:4, practice:"Loving-kindness meditation - Bilateral scanning",            stageLabel:"Stage 4.1", shortLabel:"4.1" },
  { n:10, title:"Maintaining Well-Being and Growth",         stage:4, practice:"Full practice integration - Relapse prevention",             stageLabel:"Stage 4.2", shortLabel:"4.2" },
];

const PRIMARY_BLUE = "#203E49";
const BRAND_ORANGE = "#D9783D";
const CTA_ORANGE = "#B75A2A";
const MAIN_BACKGROUND = "#F6F2EC";
const CARD_WHITE = "#FFFDF9";
const TEXT_PRIMARY = "#263238";
const TEXT_MUTED = "#5E6B70";
const DIVIDER = "#E3DDD4";
const SOFT_DIVIDER = "#D7D0C7";

const APP_PROMPTS = [
  { label:"How do I log my practice?" },
  { label:"Where do I find my assessment results?" },
  { label:"How do I add or edit a goal?" },
  { label:"How do I set a reminder?" },
  { label:"The app isn't working" },
  { label:"How do I use [feature]?" },
];

function buildSystemPrompt(week) {
  const w = WEEKS[week - 1];
  return `You're a warm, encouraging companion for the MiCBT Guide app. You genuinely appreciate that people are showing up to practice, and you're here to help them get the most out of the program.

YOUR ROLE:
- Help with any questions about using the MiCBT Guide app
- Explain MiCBT techniques and program concepts in a friendly, clear way
- Encourage and celebrate their practice journey
- Be conversational and human — like talking to a knowledgeable friend

IMPORTANT: YOU'RE NOT A THERAPIST
- You're a helpful guide, not a therapist, doctor, or counselor
- Never diagnose, treat issues, or offer clinical/therapeutic advice
- If someone is struggling emotionally or mentions clinical concerns, warmly suggest they speak with their therapist or healthcare provider
- Stay focused on the app and program — not deep emotional work

THEIR PRACTICE:
- They're on ${w.stageLabel}: "${w.title}"
- Current practice: ${w.practice}
- This is real commitment — acknowledge the effort it takes to show up

YOUR TONE:
- Warm, genuine, and conversational (like a supportive friend)
- Encouraging and uplifting
- Interested in how they're doing with their practice
- Clear about boundaries between app support and therapy
- Grounded and real`;
}

function App() {
  const [week, setWeek] = useState(1);
  const [messages, setMessages] = useState([]);
  const [input, setInput] = useState("");
  const [loading, setLoading] = useState(false);
  const [rateLimitInfo, setRateLimitInfo] = useState({ used: 0, remaining: 6, limit: 6 });
  const chatRef = useRef(null);
  const inputRef = useRef(null);

  const w = WEEKS[week - 1];

  useEffect(() => {
    if (chatRef.current) chatRef.current.scrollTop = chatRef.current.scrollHeight;
  }, [messages, loading]);

  useEffect(() => {
    inputRef.current?.focus();
  }, []);

  async function send(text) {
    const msg = (text || input).trim();
    if (!msg || loading) return;
    setInput("");
    
    const newMessages = [...messages, { role:"user", text:msg }];
    setMessages(newMessages);
    setLoading(true);
    
    const apiMessages = newMessages.map(m => ({ 
      role: m.role === "user" ? "user" : "assistant", 
      content: m.text 
    }));

    try {
      const res = await fetch("/.netlify/functions/chat", {
        method:"POST",
        headers:{ "Content-Type":"application/json" },
        body: JSON.stringify({
          messages: apiMessages,
          systemPrompt: buildSystemPrompt(week)
        })
      });

      if (res.status === 429) {
        const errData = await res.json();
        let errorText = errData.error || "Daily question limit reached. Please try again tomorrow.";
        if (errData.questionsUsed !== undefined) {
          errorText += `\n\nQuestions used today: ${errData.questionsUsed}/${errData.dailyLimit}`;
        }
        setMessages(prev => [...prev, { role:"assistant", text: errorText }]);
        setLoading(false);
        return;
      }

      const data = await res.json();
      const reply = data.content?.[0]?.text || "I am here - could you say a little more?";
      
      // Update rate limit info
      if (data.questionsRemaining !== undefined) {
        setRateLimitInfo({
          used: data.questionsUsed,
          remaining: data.questionsRemaining,
          limit: data.dailyLimit
        });
      }
      
      let finalReply = reply;
      if (data.warning) {
        finalReply = `${reply}\n\n⚠️ ${data.warning}`;
      }
      
      setMessages(prev => [...prev, { role:"assistant", text: finalReply }]);
    } catch(e) {
      setMessages(prev => [...prev, { role:"assistant", text:"Connection issue - please try again." }]);
    }
    
    setLoading(false);
    inputRef.current?.focus();
  }

  function handleKeyDown(e) {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      send();
    }
  }

  function renderText(text) {
    const lines = (text || '').split('\n').filter(line => line.trim());
    return lines.map((line, i) => {
      // Handle bullet points
      if (line.match(/^[\s]*[-•*]\s+/)) {
        const content = line.replace(/^[\s]*[-•*]\s+/, '');
        return React.createElement('div', { key: i, style: { marginLeft: '16px', marginBottom: '8px' } }, '• ' + content);
      }
      // Handle numbered lists
      if (line.match(/^\d+\.\s+/)) {
        return React.createElement('div', { key: i, style: { marginLeft: '16px', marginBottom: '8px' } }, line);
      }
      // Regular paragraphs
      return React.createElement('div', { key: i, style: { marginBottom: '12px', lineHeight: '1.6' } }, line);
    });
  }

  return (
    <div style={{ height:"100vh", display:"flex", flexDirection:"column", background:MAIN_BACKGROUND }}>
      
      {/* Header */}
      <div style={{ background:PRIMARY_BLUE, padding:"12px 16px", display:"flex", alignItems:"center", gap:12, flexShrink:0, boxShadow:"0 2px 8px rgba(32, 62, 73, 0.12)" }}>
        <img src="/lumi.png" alt="Lumi" style={{ width:40, height:40, borderRadius:"8px", flexShrink:0, objectFit:"contain" }} />
        <div style={{ color:"white" }}>
          <div style={{ fontSize:14, fontWeight:"600" }}>MiCBT Guide</div>
          <div style={{ fontSize:11, color:"rgba(255,255,255,.6)" }}>Help & Support</div>
        </div>
      </div>



      {/* Chat Area */}
      <div ref={chatRef} style={{ flex:1, overflowY:"auto", padding:"16px 14px", display:"flex", flexDirection:"column", gap:12 }}>
        {messages.map((m, i) => (
          <div key={i} style={{ display:"flex", gap:8, flexDirection: m.role === "user" ? "row-reverse" : "row", alignItems:"flex-start" }} className="fade-up">
            {m.role === "assistant" && (
              <img src="/lumi.png" alt="Lumi" style={{ width:32, height:32, borderRadius:"6px", flexShrink:0, objectFit:"contain" }} />
            )}
            <div style={{
              maxWidth:"82%",
              padding: m.role === "user" ? "9px 14px" : "12px 15px",
              borderRadius: m.role === "user" ? "14px 3px 14px 14px" : "3px 14px 14px 14px",
              background: m.role === "user" ? BRAND_ORANGE : CARD_WHITE,
              border: m.role === "user" ? "none" : `1px solid ${DIVIDER}`,
              color: m.role === "user" ? "white" : TEXT_PRIMARY,
              fontSize:15,
              lineHeight:1.5
            }}>
              {m.role === "assistant" ? renderText(m.text) : m.text}
            </div>
          </div>
        ))}

        {loading && (
          <div style={{ display:"flex", gap:8, alignItems:"flex-start" }}>
            <img src="/lumi.png" alt="Lumi" style={{ width:32, height:32, borderRadius:"6px", flexShrink:0, objectFit:"contain" }} />
            <div style={{ padding:"12px 15px", background:CARD_WHITE, border:`1px solid ${DIVIDER}`, borderRadius:"3px 14px 14px 14px", display:"flex", gap:5 }}>
              {[0, 0.2, 0.4].map((d, i) => (
                <div key={i} style={{ width:7, height:7, borderRadius:"50%", background:"#ccc", animation:`dot 1.3s infinite ${d}s` }} />
              ))}
            </div>
          </div>
        )}
      </div>

      {/* Input Area */}
      <div style={{ background:CARD_WHITE, borderTop:`1px solid ${DIVIDER}`, padding:"12px 14px 14px", position:"relative" }}>
        <div style={{ fontSize:11, color:TEXT_MUTED, position:"absolute", bottom:62, right:14, textAlign:"right" }}>
          {rateLimitInfo.remaining}/{rateLimitInfo.limit} questions
        </div>
        <div style={{ display:"flex", gap:8, alignItems:"flex-end" }}>
          <textarea
            ref={inputRef}
            value={input}
            onChange={e => setInput(e.target.value)}
            onKeyDown={handleKeyDown}
            placeholder="Ask anything about your practice..."
            rows={2}
            style={{
              flex:1,
              padding:"10px 13px",
              border:`1.5px solid ${DIVIDER}`,
              borderRadius:10,
              fontSize:16,
              color:TEXT_PRIMARY,
              background:"#f9f9f9",
              resize:"none",
              fontFamily:"inherit",
              lineHeight:1.5
            }}
          />
          <button
            onClick={() => send()}
            disabled={loading || !input.trim()}
            style={{
              width:44,
              height:44,
              borderRadius:10,
              border:"none",
              background: loading || !input.trim() ? "#ddd" : BRAND_ORANGE,
              color: loading || !input.trim() ? "#aaa" : "white",
              fontSize:20,
              flexShrink:0,
              cursor: loading || !input.trim() ? "not-allowed" : "pointer"
            }}
          >
            ↑
          </button>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
