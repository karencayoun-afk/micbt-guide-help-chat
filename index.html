<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MiCBT Guide - Help Chat</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Serif+Display:ital@1&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --teal:        #3E5B6C;
      --teal-dark:   #2C4254;
      --orange:      #F38846;
      --pale:        #F5F0E8;
      --border:      #DDD5C8;
      --text-dark:   #2C3E4A;
      --text-mid:    #5A7A8A;
      --text-light:  #8AACBC;
      --r-card:      14px;
      --shadow-card: 0 1px 4px rgba(0,0,0,0.07), 0 4px 12px rgba(0,0,0,0.05);
    }

    html, body {
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #1a2e3c;
      font-family: 'DM Sans', sans-serif;
      color: var(--text-dark);
    }

    #app {
      width: 100%;
      max-width: 500px;
      height: 100vh;
      display: flex;
      flex-direction: column;
      background: white;
    }

    .header {
      background: var(--teal);
      color: white;
      padding: 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    .header-logo {
      width: 40px;
      height: 40px;
      border-radius: 8px;
      object-fit: contain;
    }

    .header-text h1 {
      font-size: 16px;
      font-weight: 600;
      margin: 0;
    }

    .header-text p {
      font-size: 12px;
      opacity: 0.8;
      margin: 2px 0 0 0;
    }

    .chat-container {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .message {
      display: flex;
      gap: 8px;
      animation: slideIn 0.3s ease;
    }

    .message.user {
      flex-direction: row-reverse;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(8px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .message-avatar {
      width: 32px;
      height: 32px;
      border-radius: 6px;
      flex-shrink: 0;
      object-fit: contain;
    }

    .message-bubble {
      max-width: 80%;
      padding: 12px 15px;
      border-radius: 14px;
      line-height: 1.5;
      word-wrap: break-word;
    }

    .message.assistant .message-bubble {
      background: #f5f5f5;
      border: 1px solid var(--border);
      color: var(--text-dark);
    }

    .message.user .message-bubble {
      background: var(--orange);
      color: white;
      border-radius: 14px 3px 14px 14px;
    }

    .typing-indicator {
      display: flex;
      gap: 4px;
      padding: 12px 15px;
    }

    .typing-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #ccc;
      animation: typing 1.4s infinite;
    }

    .typing-dot:nth-child(2) {
      animation-delay: 0.2s;
    }

    .typing-dot:nth-child(3) {
      animation-delay: 0.4s;
    }

    @keyframes typing {
      0%, 60%, 100% {
        opacity: 0.3;
      }
      30% {
        opacity: 1;
      }
    }

    .input-area {
      background: white;
      border-top: 1px solid var(--border);
      padding: 12px;
      flex-shrink: 0;
    }

    .input-wrapper {
      display: flex;
      gap: 8px;
      align-items: flex-end;
    }

    textarea {
      flex: 1;
      border: 1.5px solid #ddd;
      border-radius: 10px;
      padding: 10px 13px;
      font-family: 'DM Sans', sans-serif;
      font-size: 16px;
      color: var(--text-dark);
      resize: none;
      max-height: 100px;
      line-height: 1.5;
    }

    textarea:focus {
      outline: none;
      border-color: var(--orange);
    }

    .send-btn {
      width: 44px;
      height: 44px;
      border: none;
      border-radius: 10px;
      background: var(--orange);
      color: white;
      font-size: 20px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: opacity 0.2s;
    }

    .send-btn:hover:not(:disabled) {
      opacity: 0.9;
    }

    .send-btn:disabled {
      background: #ddd;
      cursor: not-allowed;
    }

    .stage-selector {
      padding: 12px;
      background: #f9f9f9;
      border-bottom: 1px solid var(--border);
      display: flex;
      gap: 6px;
      overflow-x: auto;
      flex-shrink: 0;
    }

    .stage-btn {
      padding: 6px 12px;
      border: 1.5px solid #ddd;
      background: white;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.2s;
    }

    .stage-btn.active {
      background: var(--orange);
      border-color: var(--orange);
      color: white;
    }

    .error-message {
      padding: 12px;
      background: #ffe8e8;
      border: 1px solid #ffb3b3;
      border-radius: 8px;
      color: #d32f2f;
      font-size: 13px;
      margin: 8px;
    }

    .welcome-note {
      padding: 10px 14px;
      background: #e8eef5;
      border-left: 4px solid var(--teal);
      font-size: 12px;
      color: var(--text-mid);
      line-height: 1.6;
      margin: 8px;
    }
  </style>
</head>
<body>

<div id="app">
  <div class="header">
    <img src="./lumi.png" alt="Lumi" class="header-logo" />
    <div class="header-text">
      <h1>MiCBT Guide</h1>
      <p id="stage-label">Stage 1.1</p>
    </div>
  </div>

  <div class="stage-selector" id="stageSelector"></div>

  <div class="chat-container" id="chatContainer"></div>

  <div class="input-area">
    <div class="input-wrapper">
      <textarea id="userInput" placeholder="Ask anything about your practice..." rows="2"></textarea>
      <button class="send-btn" id="sendBtn">↑</button>
    </div>
  </div>
</div>

<script>
// Configuration
const STAGES = [
  { number: 1, label: "1.1", title: "Establishing Self-Care" },
  { number: 2, label: "1.2", title: "Regulating Attention" },
  { number: 3, label: "1.3", title: "Understanding Emotions" },
  { number: 4, label: "1.4", title: "Applying Mindfulness" },
  { number: 5, label: "2.1", title: "Regulating Behavior" },
  { number: 6, label: "2.2", title: "Self-Confidence" },
  { number: 7, label: "3.1", title: "Interpersonal Mindfulness" },
  { number: 8, label: "3.2", title: "Mindful Communication" },
  { number: 9, label: "4.1", title: "Cultivating Compassion" },
  { number: 10, label: "4.2", title: "Maintaining Well-Being" },
];

let currentStage = 1;
let messages = [];
let isLoading = false;

// DOM Elements
const chatContainer = document.getElementById('chatContainer');
const userInput = document.getElementById('userInput');
const sendBtn = document.getElementById('sendBtn');
const stageSelector = document.getElementById('stageSelector');
const stageLabel = document.getElementById('stage-label');

// Initialize
function init() {
  renderStageSelector();
  renderWelcome();
  userInput.addEventListener('keydown', handleKeyDown);
  sendBtn.addEventListener('click', sendMessage);
}

function renderStageSelector() {
  stageSelector.innerHTML = '';
  STAGES.forEach(stage => {
    const btn = document.createElement('button');
    btn.className = `stage-btn ${stage.number === currentStage ? 'active' : ''}`;
    btn.textContent = stage.label;
    btn.onclick = () => selectStage(stage.number);
    stageSelector.appendChild(btn);
  });
}

function selectStage(num) {
  currentStage = num;
  const stage = STAGES[num - 1];
  stageLabel.textContent = `Stage ${stage.label}`;
  renderStageSelector();
  messages = [];
  renderWelcome();
}

function renderWelcome() {
  chatContainer.innerHTML = `
    <div class="welcome-note">
      <strong>Note:</strong> I'm here to help with questions about the app and program. For clinical concerns, please contact a healthcare professional.
    </div>
  `;
  chatContainer.scrollTop = chatContainer.scrollHeight;
}

function handleKeyDown(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

async function sendMessage() {
  const text = userInput.value.trim();
  if (!text || isLoading) return;

  // Add user message
  messages.push({ role: 'user', content: text });
  renderMessages();
  userInput.value = '';

  isLoading = true;
  sendBtn.disabled = true;

  try {
    // Call backend function (uses CLAUDE_API_KEY from Netlify environment)
    const response = await fetch('/.netlify/functions/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        message: text,
        stage: currentStage,
        conversationHistory: messages
      })
    });

    if (!response.ok) {
      throw new Error(`API error: ${response.status}`);
    }

    const data = await response.json();
    messages.push({ role: 'assistant', content: data.reply });
    renderMessages();

  } catch (error) {
    console.error('Error:', error);
    const errorDiv = document.createElement('div');
    errorDiv.className = 'error-message';
    errorDiv.textContent = `Error: ${error.message}. Please try again.`;
    chatContainer.appendChild(errorDiv);
  } finally {
    isLoading = false;
    sendBtn.disabled = false;
    userInput.focus();
  }
}

function renderMessages() {
  chatContainer.innerHTML = `
    <div class="welcome-note">
      <strong>Note:</strong> I'm here to help with questions about the app and program.
    </div>
  `;

  messages.forEach(msg => {
    const div = document.createElement('div');
    div.className = `message ${msg.role}`;
    
    if (msg.role === 'assistant') {
      div.innerHTML = `
        <img src="./lumi.png" alt="Lumi" class="message-avatar" />
        <div class="message-bubble">${escapeHtml(msg.content)}</div>
      `;
    } else {
      div.innerHTML = `
        <div class="message-bubble">${escapeHtml(msg.content)}</div>
      `;
    }
    
    chatContainer.appendChild(div);
  });

  if (isLoading) {
    const loadingDiv = document.createElement('div');
    loadingDiv.className = 'message assistant';
    loadingDiv.innerHTML = `
      <img src="./lumi.png" alt="Lumi" class="message-avatar" />
      <div class="typing-indicator">
        <div class="typing-dot"></div>
        <div class="typing-dot"></div>
        <div class="typing-dot"></div>
      </div>
    `;
    chatContainer.appendChild(loadingDiv);
  }

  chatContainer.scrollTop = chatContainer.scrollHeight;
}

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

// Start
init();
</script>

</body>
</html>
